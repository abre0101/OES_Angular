<div class="page-header">
    <h1 class="page-title">🔔 Notifications</h1>
</div>
<div class="admin-content" style="padding-top:0;max-width:700px;">
    <div *ngIf="loading" class="empty-state">Loading...</div>
    <ng-container *ngIf="!loading">
        <div *ngFor="let n of notifications" class="content-card" style="margin-bottom:1rem;cursor:pointer;"
            [style.border-left]="n.is_read ? '4px solid var(--border-color)' : '4px solid var(--primary-color)'"
            (click)="markRead(n)">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;">
                <div>
                    <div style="font-weight:700;"
                        [style.color]="n.is_read ? 'var(--text-secondary)' : 'var(--primary-color)'">
                        {{ n.title ?? n.message }}
                    </div>
                    <div *ngIf="n.body" style="color:var(--text-secondary);font-size:.9rem;margin-top:.3rem;">{{ n.body
                        }}</div>
                    <div style="font-size:.8rem;color:var(--text-secondary);margin-top:.4rem;">{{ n.created_at |
                        date:'medium' }}</div>
                </div>
                <span *ngIf="!n.is_read" class="badge badge-info">New</span>
            </div>
        </div>
        <div *ngIf="notifications.length===0" class="empty-state">No notifications.</div>
    </ng-container>
</div>
