<div class="page-header">
    <h1 class="page-title">📚 My Courses</h1>
</div>
<div class="admin-content" style="padding-top:0;">
    <div *ngIf="loading" class="empty-state">Loading...</div>
    <div *ngIf="!loading" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.25rem;">
        <div *ngFor="let c of courses" class="content-card">
            <div style="font-size:2.5rem;margin-bottom:.75rem;">📚</div>
            <h3 style="font-weight:800;margin-bottom:.25rem;">{{ c.name }}</h3>
            <span class="badge badge-info" style="margin-bottom:.75rem;display:inline-block;">{{ c.code }}</span>
            <p style="color:var(--text-secondary);font-size:.9rem;">{{ c.description || 'No description.' }}</p>
            <div style="margin-top:1rem;font-size:.85rem;color:var(--text-secondary);">{{ c.credit_hours }} credit hours
            </div>
        </div>
        <div *ngIf="courses.length===0" style="grid-column:1/-1;" class="empty-state">No courses assigned yet.</div>
    </div>
</div>
