<div class="page-header">
    <h1 class="page-title">🎯 Practice Questions</h1>
    <button class="btn btn-primary" (click)="openForm()">+ Add Question</button>
</div>
<div class="admin-content" style="padding-top:0;">
    <div *ngIf="showForm" class="content-card" style="margin-bottom:1.5rem;">
        <h3 style="font-weight:800;margin-bottom:1rem;">{{ editing ? 'Edit' : 'Add' }} Practice Question</h3>
        <div *ngIf="error" style="color:#dc3545;margin-bottom:.75rem;">{{ error }}</div>
        <div style="display:grid;gap:1rem;">
            <div class="form-group">
                <label>Course</label>
                <select class="form-control" [(ngModel)]="form.course">
                    <option value="">Select course...</option>
                    <option *ngFor="let c of courses" [value]="c.id">{{ c.name }}</option>
                </select>
            </div>
            <div class="form-group">
                <label>Question Text</label>
                <textarea class="form-control" rows="3" [(ngModel)]="form.question_text"></textarea>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                <div class="form-group"><label>Option A</label><input class="form-control" [(ngModel)]="form.option_a">
                </div>
                <div class="form-group"><label>Option B</label><input class="form-control" [(ngModel)]="form.option_b">
                </div>
                <div class="form-group"><label>Option C</label><input class="form-control" [(ngModel)]="form.option_c">
                </div>
                <div class="form-group"><label>Option D</label><input class="form-control" [(ngModel)]="form.option_d">
                </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                <div class="form-group">
                    <label>Correct Answer</label>
                    <select class="form-control" [(ngModel)]="form.correct_answer">
                        <option value="A">A</option>
                        <option value="B">B</option>
                        <option value="C">C</option>
                        <option value="D">D</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Explanation (optional)</label>
                    <input class="form-control" [(ngModel)]="form.explanation">
                </div>
            </div>
        </div>
        <div style="display:flex;gap:.75rem;margin-top:1rem;">
            <button class="btn btn-primary" (click)="save()" [disabled]="saving">{{ saving ? 'Saving...' : 'Save'
                }}</button>
            <button class="btn btn-secondary" (click)="showForm=false">Cancel</button>
        </div>
    </div>

    <div *ngIf="loading" class="empty-state">Loading...</div>
    <div *ngIf="!loading" class="content-card" style="padding:0;overflow:hidden;">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Question</th>
                    <th>Course</th>
                    <th>Answer</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let q of questions">
                    <td style="max-width:300px;">{{ q.question_text }}</td>
                    <td>{{ q.course_name ?? q.course }}</td>
                    <td><span class="badge badge-success">{{ q.correct_answer }}</span></td>
                    <td>
                        <button class="btn btn-primary btn-sm" (click)="openForm(q)">Edit</button>
                        <button class="btn btn-danger btn-sm" (click)="delete(q.id)"
                            style="margin-left:.5rem;">Delete</button>
                    </td>
                </tr>
                <tr *ngIf="questions.length===0">
                    <td colspan="4" class="empty-state">No practice questions yet.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
