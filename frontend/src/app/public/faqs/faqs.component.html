<div class="pub-page">
    <div class="pub-container">
        <div class="pub-page-header">
            <h1>📚 Frequently Asked Questions</h1>
            <p>Find answers to common questions about the examination system</p>
        </div>

        <div class="faq-list">
            <div *ngFor="let faq of faqs; let i=index" class="faq-item" [class.active]="activeIndex===i"
                (click)="toggle(i)">
                <div class="faq-question">
                    <span>{{ faq.q }}</span>
                    <span class="faq-icon">{{ activeIndex===i ? '▲' : '▼' }}</span>
                </div>
                <div class="faq-answer" *ngIf="activeIndex===i">{{ faq.a }}</div>
            </div>
        </div>
    </div>
</div>
