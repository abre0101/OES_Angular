<div class="page-header" style="display:flex;justify-content:space-between;align-items:center;">
    <h2>Report an Issue</h2>
    <button class="btn btn-primary" (click)="showForm=!showForm">+ New Issue</button>
</div>
<div class="page-body">
    <div *ngIf="success" class="alert alert-success">{{ success }}</div>
    <div *ngIf="showForm" class="card" style="margin-bottom:1.5rem;">
        <h3 style="margin-bottom:1rem;">Report Technical Issue</h3>
        <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
        <div class="form-group"><label>Title</label><input class="form-control" [(ngModel)]="form.title" /></div>
        <div class="form-group"><label>Description</label><textarea class="form-control" [(ngModel)]="form.description"
                rows="4"></textarea></div>
        <div style="display:flex;gap:0.75rem;">
            <button class="btn btn-primary" (click)="submit()">Submit</button>
            <button class="btn btn-outline" (click)="showForm=false">Cancel</button>
        </div>
    </div>

    <div *ngIf="loading">Loading...</div>
    <div *ngIf="!loading" class="card" style="padding:0;overflow:hidden;">
        <table class="table">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Status</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let i of issues">
                    <td>{{ i.title }}</td>
                    <td><span class="badge" [class.badge-danger]="i.status==='open'"
                            [class.badge-warning]="i.status==='in_progress'"
                            [class.badge-success]="i.status==='resolved'">{{ i.status }}</span></td>
                    <td>{{ i.created_at | date:'mediumDate' }}</td>
                </tr>
                <tr *ngIf="issues.length===0">
                    <td colspan="3" style="text-align:center;color:#6b7280;">No issues reported.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
