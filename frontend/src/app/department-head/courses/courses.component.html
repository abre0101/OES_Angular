<div class="page-header">
    <h1 class="page-title">📚 Course Management</h1>
    <a routerLink="/department-head/register-course" class="btn btn-primary">+ Register Course</a>
</div>
<div class="admin-content" style="padding-top:0;">
    <div *ngIf="loading" class="empty-state">Loading...</div>
    <div *ngIf="!loading" class="content-card" style="padding:0;overflow:hidden;">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Code</th>
                    <th>Name</th>
                    <th>Department</th>
                    <th>Credits</th>
                    <th>Status</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let c of courses">
                    <td><span class="badge badge-info">{{ c.code }}</span></td>
                    <td style="font-weight:600;">{{ c.name }}</td>
                    <td style="color:var(--text-secondary);">{{ c.department_name }}</td>
                    <td>{{ c.credit_hours }}</td>
                    <td><span class="badge" [class.badge-success]="c.is_active" [class.badge-danger]="!c.is_active">{{
                            c.is_active ? 'Active' : 'Inactive' }}</span></td>
                    <td><a [routerLink]="['/department-head/courses', c.id]" class="btn btn-sm btn-primary">View</a>
                    </td>
                </tr>
                <tr *ngIf="courses.length===0">
                    <td colspan="6" class="empty-state">No courses found.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
