<div class="page-header">
    <h1 class="page-title">⚠️ Issues</h1>
    <p class="page-subtitle">View and manage reported issues</p>
</div>
<div class="admin-content" style="padding-top:0;">
    <div *ngIf="loading" class="empty-state">Loading...</div>
    <div *ngIf="!loading" class="content-card" style="padding:0;overflow:hidden;">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Reported By</th>
                    <th>Status</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let i of issues">
                    <td style="font-weight:600;">{{ i.title }}</td>
                    <td>{{ i.reported_by_name }}</td>
                    <td>
                        <span class="badge" [class.badge-danger]="i.status==='open'"
                            [class.badge-warning]="i.status==='in_progress'"
                            [class.badge-success]="i.status==='resolved'">
                            {{ i.status }}
                        </span>
                    </td>
                    <td>{{ i.created_at | date:'short' }}</td>
                    <td>
                        <select class="form-control" style="width:auto;padding:.3rem .5rem;font-size:.8rem;"
                            (change)="updateStatus(i.id, $any($event.target).value)" [value]="i.status">
                            <option value="open">Open</option>
                            <option value="in_progress">In Progress</option>
                            <option value="resolved">Resolved</option>
                        </select>
                    </td>
                </tr>
                <tr *ngIf="issues.length===0">
                    <td colspan="5" class="empty-state">No issues reported.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
