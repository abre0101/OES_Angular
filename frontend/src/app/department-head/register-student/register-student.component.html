<div class="page-header">
    <h1 class="page-title">➕ Register New Student</h1>
    <p class="page-subtitle">Add a new student to your department</p>
</div>
<div class="admin-content" style="padding-top:0;max-width:800px;">
    <div *ngIf="success" class="content-card" style="border-left:4px solid var(--success-color);margin-bottom:1rem;">✓
        {{success}}</div>
    <div *ngIf="error" class="content-card" style="border-left:4px solid #dc3545;margin-bottom:1rem;color:#dc3545;">✗
        {{error}}</div>

    <div class="content-card">
        <h3 style="font-weight:800;margin-bottom:1.5rem;">Student Information</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
            <div class="form-group">
                <label>Full Name *</label>
                <input class="form-control" [(ngModel)]="form.full_name" (input)="onNameInput()"
                    placeholder="e.g. John Doe">
            </div>
            <div class="form-group">
                <label>Username *</label>
                <input class="form-control" [(ngModel)]="form.username" placeholder="Auto-suggested">
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" class="form-control" [(ngModel)]="form.email">
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input class="form-control" [(ngModel)]="form.phone" placeholder="+251...">
            </div>
            <div class="form-group">
                <label>Gender *</label>
                <select class="form-control" [(ngModel)]="form.gender">
                    <option value="">Select...</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
            <div class="form-group">
                <label>Password *</label>
                <input type="password" class="form-control" [(ngModel)]="form.password">
            </div>
            <div class="form-group">
                <label>Academic Year *</label>
                <select class="form-control" [(ngModel)]="form.academic_year">
                    <option value="">Select...</option>
                    <option *ngFor="let y of [1,2,3,4,5]" [value]="'Year '+y">Year {{y}}</option>
                </select>
            </div>
            <div class="form-group">
                <label>Semester *</label>
                <select class="form-control" [(ngModel)]="form.semester">
                    <option value="">Select...</option>
                    <option *ngFor="let s of [1,2]" [value]="s">Semester {{s}}</option>
                </select>
            </div>
            <div class="form-group" style="grid-column:1/-1;">
                <label>Department</label>
                <select class="form-control" [(ngModel)]="form.department_id">
                    <option value="">Select department...</option>
                    <option *ngFor="let d of departments" [value]="d.id">{{d.name}}</option>
                </select>
            </div>
        </div>
        <div style="display:flex;gap:.75rem;margin-top:1.5rem;">
            <button class="btn btn-primary" (click)="submit()" [disabled]="saving">{{saving ? 'Registering...' :
                'Register Student'}}</button>
            <a routerLink="/department-head/students" class="btn btn-secondary">Cancel</a>
        </div>
    </div>
</div>
