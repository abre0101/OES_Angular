<div class="page-header">
    <h1 class="page-title">📖 Register New Course</h1>
    <p class="page-subtitle">Add a new course to your department</p>
</div>
<div class="admin-content" style="padding-top:0;max-width:700px;">
    <div *ngIf="success" class="content-card" style="border-left:4px solid var(--success-color);margin-bottom:1rem;">✓
        {{success}}</div>
    <div *ngIf="error" class="content-card" style="border-left:4px solid #dc3545;margin-bottom:1rem;color:#dc3545;">✗
        {{error}}</div>

    <div class="content-card">
        <h3 style="font-weight:800;margin-bottom:1.5rem;">Course Information</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
            <div class="form-group">
                <label>Course Name *</label>
                <input class="form-control" [(ngModel)]="form.name" placeholder="e.g. Human Anatomy">
            </div>
            <div class="form-group">
                <label>Course Code *</label>
                <input class="form-control" [(ngModel)]="form.code" placeholder="e.g. ANAT101">
            </div>
            <div class="form-group">
                <label>Credit Hours</label>
                <input type="number" class="form-control" [(ngModel)]="form.credit_hours" min="1" max="10">
            </div>
            <div class="form-group">
                <label>Semester</label>
                <select class="form-control" [(ngModel)]="form.semester">
                    <option value="">Select...</option>
                    <option *ngFor="let s of [1,2,3,4,5,6,7,8]" [value]="s">Semester {{s}}</option>
                </select>
            </div>
            <div class="form-group" style="grid-column:1/-1;">
                <label>Department</label>
                <select class="form-control" [(ngModel)]="form.department_id">
                    <option value="">Select department...</option>
                    <option *ngFor="let d of departments" [value]="d.id">{{d.name}}</option>
                </select>
            </div>
            <div class="form-group" style="grid-column:1/-1;">
                <label>Description</label>
                <textarea class="form-control" rows="3" [(ngModel)]="form.description"
                    placeholder="Course description..."></textarea>
            </div>
        </div>
        <div style="display:flex;gap:.75rem;margin-top:1.5rem;">
            <button class="btn btn-primary" (click)="submit()" [disabled]="saving">{{saving ? 'Registering...' :
                'Register Course'}}</button>
            <a routerLink="/department-head/courses" class="btn btn-secondary">Cancel</a>
        </div>
    </div>
</div>
