<div class="page-header">
    <h1 class="page-title">📋 Department Exams</h1>
</div>
<div class="admin-content" style="padding-top:0;">
    <div *ngIf="loading" class="empty-state">Loading...</div>
    <div *ngIf="!loading" class="content-card" style="padding:0;overflow:hidden;">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Course</th>
                    <th>Instructor</th>
                    <th>Status</th>
                    <th>Questions</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let e of exams">
                    <td style="font-weight:600;">{{ e.title }}</td>
                    <td>{{ e.course_name }}</td>
                    <td>{{ e.created_by_name }}</td>
                    <td>
                        <span class="badge" [class.badge-warning]="e.status==='pending'"
                            [class.badge-success]="e.status==='approved'" [class.badge-danger]="e.status==='rejected'"
                            [class.badge-info]="e.status==='active'">
                            {{ e.status }}
                        </span>
                    </td>
                    <td>{{ e.question_count }}</td>
                    <td><a [routerLink]="['/department-head/exams', e.id]" class="btn btn-sm btn-primary">View</a></td>
                </tr>
                <tr *ngIf="exams.length===0">
                    <td colspan="6" class="empty-state">No exams found.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
