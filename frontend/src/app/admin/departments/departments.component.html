<div class="page-header" style="display:flex;justify-content:space-between;align-items:center;">
    <h2>Departments</h2>
    <button class="btn btn-primary" (click)="openCreate()">+ Add Department</button>
</div>
<div class="page-body">
    <div *ngIf="showForm" class="card" style="margin-bottom:1.5rem;">
        <h3 style="margin-bottom:1rem;">{{ editing ? 'Edit' : 'Add' }} Department</h3>
        <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
        <div class="form-group"><label>Name</label><input class="form-control" [(ngModel)]="form.name" /></div>
        <div class="form-group">
            <label>Faculty</label>
            <select class="form-control" [(ngModel)]="form.faculty">
                <option *ngFor="let f of faculties" [value]="f.id">{{ f.name }}</option>
            </select>
        </div>
        <div class="form-group"><label>Description</label><textarea class="form-control" [(ngModel)]="form.description"
                rows="2"></textarea></div>
        <div style="display:flex;gap:0.75rem;">
            <button class="btn btn-primary" (click)="save()">Save</button>
            <button class="btn btn-outline" (click)="showForm=false">Cancel</button>
        </div>
    </div>
    <div *ngIf="loading">Loading...</div>
    <div *ngIf="!loading" class="card" style="padding:0;overflow:hidden;">
        <table class="table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Faculty</th>
                    <th>Head</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let d of departments">
                    <td>{{ d.name }}</td>
                    <td>{{ d.faculty_name }}</td>
                    <td>{{ d.head_name || '—' }}</td>
                    <td>
                        <button class="btn btn-sm btn-outline" (click)="openEdit(d)">Edit</button>
                        <button class="btn btn-sm btn-danger" style="margin-left:0.5rem;"
                            (click)="delete(d.id)">Delete</button>
                    </td>
                </tr>
                <tr *ngIf="departments.length===0">
                    <td colspan="4" style="text-align:center;color:#6b7280;">No departments found.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
