<div class="page-header" style="display:flex;justify-content:space-between;align-items:center;">
    <div>
        <h1 class="page-title">🏛️ Colleges / Faculties</h1>
    </div>
    <button class="btn btn-primary" (click)="openCreate()">+ Add College</button>
</div>
<div class="admin-content" style="padding-top:0;">
    <div *ngIf="showForm" class="content-card" style="margin-bottom:1.5rem;">
        <h3 style="margin-bottom:1rem;font-weight:800;">{{ editing ? 'Edit' : 'Add' }} College</h3>
        <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
        <div class="form-group"><label>Name</label><input class="form-control" [(ngModel)]="form.name" /></div>
        <div class="form-group"><label>Description</label><textarea class="form-control" [(ngModel)]="form.description"
                rows="2"></textarea></div>
        <div style="display:flex;gap:.75rem;"><button class="btn btn-primary" (click)="save()">Save</button><button
                class="btn btn-outline" (click)="showForm=false">Cancel</button></div>
    </div>
    <div *ngIf="loading" class="empty-state">Loading...</div>
    <div *ngIf="!loading" class="content-card" style="padding:0;overflow:hidden;">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let f of faculties">
                    <td style="font-weight:700;">{{ f.name }}</td>
                    <td style="color:var(--text-secondary);">{{ f.description || '—' }}</td>
                    <td><button class="btn btn-sm btn-outline" (click)="openEdit(f)">Edit</button> <button
                            class="btn btn-sm btn-danger" (click)="delete(f.id)">Delete</button></td>
                </tr>
                <tr *ngIf="faculties.length===0">
                    <td colspan="3" class="empty-state">No colleges found.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
