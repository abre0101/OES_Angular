<div class="page-header" style="display:flex;justify-content:space-between;align-items:center;">
    <h2>Courses</h2>
    <button class="btn btn-primary" (click)="openCreate()">+ Add Course</button>
</div>
<div class="page-body">
    <div *ngIf="showForm" class="card" style="margin-bottom:1.5rem;">
        <h3 style="margin-bottom:1rem;">{{ editingCourse ? 'Edit' : 'Add' }} Course</h3>
        <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
            <div class="form-group">
                <label>Course Code</label>
                <input class="form-control" [(ngModel)]="form.code" />
            </div>
            <div class="form-group">
                <label>Course Name</label>
                <input class="form-control" [(ngModel)]="form.name" />
            </div>
            <div class="form-group">
                <label>Department</label>
                <select class="form-control" [(ngModel)]="form.department">
                    <option *ngFor="let d of departments" [value]="d.id">{{ d.name }}</option>
                </select>
            </div>
            <div class="form-group">
                <label>Credit Hours</label>
                <input class="form-control" type="number" [(ngModel)]="form.credit_hours" />
            </div>
            <div class="form-group" style="grid-column:1/-1;">
                <label>Description</label>
                <textarea class="form-control" [(ngModel)]="form.description" rows="2"></textarea>
            </div>
        </div>
        <div style="display:flex;gap:0.75rem;margin-top:0.5rem;">
            <button class="btn btn-primary" (click)="save()">Save</button>
            <button class="btn btn-outline" (click)="showForm=false">Cancel</button>
        </div>
    </div>

    <div *ngIf="loading">Loading...</div>
    <div *ngIf="!loading" class="card" style="padding:0;overflow:hidden;">
        <table class="table">
            <thead>
                <tr>
                    <th>Code</th>
                    <th>Name</th>
                    <th>Department</th>
                    <th>Credits</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let c of courses">
                    <td>{{ c.code }}</td>
                    <td>{{ c.name }}</td>
                    <td>{{ c.department_name }}</td>
                    <td>{{ c.credit_hours }}</td>
                    <td>
                        <button class="btn btn-sm btn-outline" (click)="openEdit(c)">Edit</button>
                        <button class="btn btn-sm btn-danger" style="margin-left:0.5rem;"
                            (click)="delete(c.id)">Delete</button>
                    </td>
                </tr>
                <tr *ngIf="courses.length===0">
                    <td colspan="5" style="text-align:center;color:#6b7280;">No courses found.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
