<div class="page-header" style="display:flex;justify-content:space-between;align-items:center;">
    <h2>{{ roleLabel }}s</h2>
    <button class="btn btn-primary" (click)="openCreate()">+ Add {{ roleLabel }}</button>
</div>
<div class="page-body">
    <div *ngIf="success" class="alert alert-success">{{ success }}</div>

    <!-- Form Modal -->
    <div *ngIf="showForm" class="card" style="margin-bottom:1.5rem;">
        <h3 style="margin-bottom:1rem;">{{ editingUser ? 'Edit' : 'Add' }} {{ roleLabel }}</h3>
        <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
            <div class="form-group">
                <label>First Name</label>
                <input class="form-control" [(ngModel)]="form.first_name" />
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input class="form-control" [(ngModel)]="form.last_name" />
            </div>
            <div class="form-group">
                <label>Username</label>
                <input class="form-control" [(ngModel)]="form.username" />
            </div>
            <div class="form-group">
                <label>Email</label>
                <input class="form-control" type="email" [(ngModel)]="form.email" />
            </div>
            <div class="form-group" *ngIf="!editingUser">
                <label>Password</label>
                <input class="form-control" type="password" [(ngModel)]="form.password" />
            </div>
            <div class="form-group">
                <label>Department</label>
                <input class="form-control" [(ngModel)]="form.department" />
            </div>
            <div class="form-group" *ngIf="role === 'student'">
                <label>Student ID</label>
                <input class="form-control" [(ngModel)]="form.student_id" />
            </div>
            <div class="form-group" *ngIf="role !== 'student'">
                <label>Employee ID</label>
                <input class="form-control" [(ngModel)]="form.employee_id" />
            </div>
        </div>
        <div style="display:flex;gap:0.75rem;margin-top:0.5rem;">
            <button class="btn btn-primary" (click)="save()">Save</button>
            <button class="btn btn-outline" (click)="showForm=false">Cancel</button>
        </div>
    </div>

    <div *ngIf="loading">Loading...</div>
    <div *ngIf="!loading" class="card" style="padding:0;overflow:hidden;">
        <table class="table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Department</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let u of users">
                    <td>{{ u.full_name }}</td>
                    <td>{{ u.username }}</td>
                    <td>{{ u.email }}</td>
                    <td>{{ u.department }}</td>
                    <td><span class="badge" [class.badge-success]="u.is_active" [class.badge-danger]="!u.is_active">{{
                            u.is_active ? 'Active' : 'Inactive' }}</span></td>
                    <td>
                        <button class="btn btn-sm btn-outline" (click)="openEdit(u)">Edit</button>
                        <button class="btn btn-sm btn-danger" style="margin-left:0.5rem;"
                            (click)="delete(u.id)">Delete</button>
                    </td>
                </tr>
                <tr *ngIf="users.length === 0">
                    <td colspan="6" style="text-align:center;color:#6b7280;">No {{ roleLabel }}s found.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
