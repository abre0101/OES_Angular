version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: oes_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: oes_db

  backend:
    build: ./backend
    container_name: oes_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: change-me-in-production
      DEBUG: "True"
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB_NAME: oes_db
      CORS_ALLOWED_ORIGINS: http://localhost:4200
    depends_on:
      - mongo

  frontend:
    image: node:20-alpine
    container_name: oes_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "4200:4200"
    command: sh -c "npm install && npx ng serve --host 0.0.0.0 --poll 500"
    depends_on:
      - backend

volumes:
  mongo_data:
